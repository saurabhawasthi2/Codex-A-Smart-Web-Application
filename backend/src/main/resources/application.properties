# Server Port
server.port=${SERVER_PORT:9090}

# Database Configuration
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/codexx?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

spring.datasource.username=${MYSQLUSER:root}

spring.datasource.password=${MYSQLPASSWORD:Bihar@8581}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true


# JWT Configuration
app.jwtSecret=${JWT_SECRET:mysupersecretkeymysupersecretkey123456}

app.jwtExpirationInMs=${JWT_EXPIRATION_MS:604800000}